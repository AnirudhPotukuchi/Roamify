<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roamify. | Payment Success</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .success-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f7f9fc;
            text-align: center;
        }
        .success-card {
            background: white;
            padding: 4rem 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            animation: fadeInPage 0.8s ease-out forwards;
        }
        .success-icon {
            font-size: 5rem;
            color: #2ecc71;
            margin-bottom: 1.5rem;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        p {
            color: #555;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .brand-text {
            color: #e74c3c;
            font-weight: 600;
        }
        .home-btn {
            display: inline-block;
            background-color: #e74c3c;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .home-btn:hover {
            background-color: #c0392b;
        }
    </style>
    <link rel="icon" href="favicon.svg">
</head>
<body class="success-page">
    <div class="success-card">
        <div class="success-icon">✓</div>
        <h1>Booking Confirmed!</h1>
        <p>Thank you for choosing <span class="brand-text">Roamify.</span> Your travel plan and payment details will be securely emailed to you shortly.</p>
        <a href="HeroPage.html" class="home-btn">Return to Home</a>
    </div>
</body>
</html>
